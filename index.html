<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>강그린 웹소설 아카이브</title>
  <meta name="description" content="웹소설 작가 강그린이 집필한 작품들을 모아 독자에게 선보이는 공식 아카이브입니다.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#5b4bff">
  <link rel="icon" href="/app/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/app/assets/css/style.css">
</head>
<body>
  <header class="site-header" data-site-header></header>

  <main>
    <div class="container">
      <!-- 히어로 -->
      <section class="hero" id="hero">
        <div class="eyebrow">KANG GREEN · WEB NOVEL ARCHIVE</div>
        <h1 id="hero-title">이야기는 계속됩니다</h1>
        <p id="hero-tagline"></p>
        <div class="hero-actions">
          <a href="/app/novels.html" class="btn btn-primary">작품 둘러보기</a>
          <a href="#recent" class="btn btn-ghost">최신 회차 보기</a>
        </div>
        <div class="stats" id="hero-stats"></div>
      </section>

      <!-- 작가 소개 -->
      <section class="section">
        <div class="card" style="padding:22px 22px">
          <div class="author-card">
            <div class="author-avatar">강</div>
            <div>
              <div class="name" id="author-name">강그린</div>
              <div class="role">웹소설 작가</div>
              <p id="author-intro"></p>
            </div>
          </div>
        </div>
      </section>

      <!-- 대표작 -->
      <section class="section" id="featured-section" hidden>
        <div class="section-head">
          <h2>⭐ 대표 작품</h2>
          <a class="more" href="/app/novels.html">전체 보기 →</a>
        </div>
        <div class="grid novels" id="featured-grid"></div>
      </section>

      <!-- 최신 업데이트 작품 -->
      <section class="section">
        <div class="section-head">
          <h2>🆕 최신 업데이트</h2>
          <a class="more" href="/app/novels.html">전체 보기 →</a>
        </div>
        <div class="grid novels" id="latest-grid"></div>
      </section>

      <!-- 광고 (중단) -->
      <div class="ad-slot"></div>

      <!-- 인기 작품 -->
      <section class="section" id="popular-section" hidden>
        <div class="section-head">
          <h2>🔥 인기 작품</h2>
        </div>
        <div class="grid novels" id="popular-grid"></div>
      </section>

      <!-- 최근 추가된 회차 -->
      <section class="section" id="recent">
        <div class="section-head">
          <h2>📖 최근 추가된 회차</h2>
        </div>
        <div class="list" id="recent-list"></div>
      </section>

      <!-- 광고 (하단) -->
      <div class="ad-slot"></div>
    </div>
  </main>

  <footer class="site-footer" data-site-footer></footer>

  <script src="/app/assets/js/common.js"></script>
  <script src="/app/assets/js/home.js"></script>
</body>
</html>
