<body>
  <header class="site-header" data-site-header></header>

  <main>
    <div class="container">
      <!-- 방문자 카운터 (제일 상단) -->
      <div class="visit-bar" data-visit-wrap hidden>👀 오늘 <b data-visit-today>-</b>명 · 누적 <b data-visit-total>-</b>명 방문</div>

      <!-- 히어로 -->
      <section class="hero" id="hero">
        <div class="eyebrow">KANG GREEN · WEB NOVEL ARCHIVE</div>

        </div>
        <div class="stats" id="hero-stats"></div>
      </section>

      <!-- 작가 소개 -->
      <section class="section">
        <div class="card" style="padding:22px 22px">

            <div class="author-avatar">강</div>
            <div>

              <div class="role">웹소설 작가</div>

        <div class="section-head">

      <!-- 최신 업데이트 작품 -->

          <h2>🆕 최신 업데이트</h2>

      <!-- 광고 (중단) -->

        </div>

        </div>
        <div class="list" id="recent-list"></div>

        <div class="section-head">
          <h2>💬 방명록</h2>
        </div>

        <div class="guestbook card">

            <div class="gb-row">
              <input id="gb-name" placeholder="이름 (선택, 미입력 시 익명)" maxlength="20" autocomplete="off">
              <a class="gb-email" href="mailto:shinnamho@naver.com">✉️ 작가에게 쪽지: shinnamho@naver.com</a>
            </div>

            <div class="gb-actions">
              <span class="gb-hint" id="gb-hint"></span>
              <button class="btn btn-primary btn-sm" type="submit" id="gb-submit">남기기</button>
            </div>

          <div id="gb-list" class="gb-list"></div>
        </div>
