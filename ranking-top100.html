<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP 100 아파트 - AptScore</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-size: 56px; color: white; margin-bottom: 12px; text-shadow: 0 4px 12px rgba(0,0,0,0.3); }
.header p { font-size: 20px; color: rgba(255,255,255,0.9); }
.back-btn {
  display: inline-block; padding: 14px 28px; background: rgba(255,255,255,0.25);
  color: white; text-decoration: none; border-radius: 12px; margin-bottom: 32px;
  transition: all 0.2s; font-weight: 600; backdrop-filter: blur(10px);
}
.back-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-2px); }
.ranking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
.rank-card {
  background: white; border-radius: 16px; padding: 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1); transition: all 0.3s; cursor: pointer;
}
.rank-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
.rank-number {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 56px; height: 56px; padding: 0 12px; border-radius: 50%;
  font-weight: 800; font-size: 22px; margin-bottom: 16px;
}
.rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: white; }
.rank-2 { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); color: white; }
.rank-3 { background: linear-gradient(135deg, #CD7F32, #B8860B); color: white; }
.rank-other { background: #f0f0f0; color: #666; }
.apt-name { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
.apt-address { font-size: 14px; color: #666; margin-bottom: 16px; }
.score-display { display: flex; align-items: center; gap: 16px; }
.score-number { font-size: 40px; font-weight: 900; }
.grade-badge { padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 16px; }
.grade-S { background: #059669; color: white; }
.grade-A { background: #2563eb; color: white; }
.medal { font-size: 32px; margin-right: 8px; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-btn">← 메인으로</a>
  <div class="header">
    <h1>🏆 TOP 100</h1>
    <p>전국 최고 점수 아파트</p>
  </div>
  <div id="ranking-container" class="ranking-grid"></div>
</div>
<script>
const top = [
  {n:'신반포자이',gu:'서초구',a:'서울 서초구 신반포로 194',s:91.3,g:'S'},
  {n:'래미안퍼스티지',gu:'서초구',a:'서울 서초구 신반포로11길 31',s:89.5,g:'S'},
  {n:'반포자이',gu:'서초구',a:'서울 서초구 신반포로 지하194',s:88.2,g:'S'},
  {n:'아크로리버파크',gu:'서초구',a:'서울 서초구 반포동131',s:87.8,g:'S'},
  {n:'올림픽파크포레온',gu:'송파구',a:'서울 송파구 올림픽로지하225',s:85.2,g:'S'},
  {n:'힐스테이트판교역',gu:'성남시',a:'경기 성남시 백현동',s:84.5,g:'S'},
  {n:'타워팰리스',gu:'강남구',a:'서울 강남구 도곡동467',s:83.8,g:'S'},
  {n:'디에이치아너힐스',gu:'강남구',a:'서울 강남구 개포동',s:82.5,g:'S'},
  {n:'롯데캐슬이스트폴',gu:'송파구',a:'서울 송파구 문정동',s:81.3,g:'S'},
  {n:'헬리오시티',gu:'송파구',a:'서울 송파구 송파대로345',s:79.8,g:'A'},
];

document.getElementById('ranking-container').innerHTML = top.map((a,i) => {
  const r = i + 1;
  const rc = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';
  const m = r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
  return `<div class="rank-card" onclick="location.href='index.html?q=${encodeURIComponent(a.n)}'">
    <div class="rank-number ${rc}">${m?'<span class="medal">'+m+'</span>':''}${r}</div>
    <div class="apt-name">${a.n}</div>
    <div class="apt-address">📍 ${a.a}</div>
    <div class="score-display">
      <span class="score-number" style="color:${a.g==='S'?'#059669':'#2563eb'}">${a.s}</span>
      <span class="grade-badge grade-${a.g}">${a.g}등급</span>
    </div>
  </div>`;
}).join('');
</script>
</body>
</html>
