<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTTOM 100 - AptScore</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  min-height: 100vh;
  padding: 40px 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-size: 56px; color: white; margin-bottom: 12px; }
.header p { font-size: 20px; color: rgba(255,255,255,0.9); }
.back-btn {
  display: inline-block; padding: 14px 28px; background: rgba(255,255,255,0.25);
  color: white; text-decoration: none; border-radius: 12px; margin-bottom: 32px;
}
.back-btn:hover { background: rgba(255,255,255,0.35); }
.info { background: rgba(255,255,255,0.2); padding: 16px; border-radius: 12px; color: white; margin-bottom: 24px; text-align: center; }
.ranking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
.rank-card { background: white; border-radius: 16px; padding: 24px; cursor: pointer; transition: 0.3s; }
.rank-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
.rank-number { padding: 8px 16px; background: #f0f0f0; border-radius: 8px; font-weight: 700; margin-bottom: 12px; display: inline-block; }
.apt-name { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.apt-address { font-size: 14px; color: #666; margin-bottom: 16px; }
.score-display { display: flex; align-items: center; gap: 16px; }
.score-number { font-size: 40px; font-weight: 900; }
.grade-badge { padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 16px; }
.grade-C { background: #ea580c; color: white; }
.grade-D { background: #dc2626; color: white; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-btn">← 메인으로</a>
  <div class="header">
    <h1>📉 BOTTOM 100</h1>
    <p>하위 점수 아파트</p>
  </div>
  <div class="info">💡 하위 점수도 지역에 따라 투자 가치가 있을 수 있습니다</div>
  <div id="ranking-container" class="ranking-grid"></div>
</div>
<script>
const bottom = [
  {n:'상계주공',gu:'노원구',a:'서울 노원구 상계동',s:45.2,g:'D'},
  {n:'은평뉴타운',gu:'은평구',a:'서울 은평구',s:46.8,g:'D'},
  {n:'강북구아파트',gu:'강북구',a:'서울 강북구',s:47.5,g:'C'},
  {n:'도봉구단지',gu:'도봉구',a:'서울 도봉구',s:48.2,g:'C'},
  {n:'중랑구',gu:'중랑구',a:'서울 중랑구',s:49.1,g:'C'},
];

document.getElementById('ranking-container').innerHTML = bottom.map((a,i) => {
  return `<div class="rank-card" onclick="location.href='index.html?q=${encodeURIComponent(a.n)}'">
    <div class="rank-number">${i+1}위</div>
    <div class="apt-name">${a.n}</div>
    <div class="apt-address">📍 ${a.a}</div>
    <div class="score-display">
      <span class="score-number" style="color:#dc2626">${a.s}</span>
      <span class="grade-badge grade-${a.g}">${a.g}등급</span>
    </div>
  </div>`;
}).join('');
</script>
</body>
</html>
