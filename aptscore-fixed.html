<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AptScore - 아파트 투자 분석기 (수정판)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header {
  text-align: center;
  padding: 40px 0 60px;
  background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(139,92,246,0.1) 100%);
  border-radius: 24px;
  margin-bottom: 40px;
}
.logo { font-size: 48px; font-weight: 800; margin-bottom: 12px;
  background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: #94a3b8; font-size: 18px; }

/* 검색 영역 */
.search-section {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 40px;
  backdrop-filter: blur(10px);
}
.search-box { display: flex; gap: 12px; max-width: 700px; margin: 0 auto 24px; }
.search-input {
  flex: 1;
  padding: 16px 24px;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  transition: all 0.3s;
}
.search-input:focus {
  outline: none;
  border-color: #3b82f6;
  background: rgba(255,255,255,0.08);
}
.search-btn {
  padding: 16px 32px;
  font-size: 16px;
  font-weight: 600;
  background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}
.search-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.quick-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.chip {
  padding: 8px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover {
  background: rgba(59,130,246,0.2);
  border-color: #3b82f6;
}

/* 로딩 */
.loading {
  display: none;
  text-align: center;
  padding: 60px;
  font-size: 18px;
  color: #3b82f6;
}
.loading.show { display: block; }
.loading::after {
  content: '...';
  animation: dots 1.5s steps(4) infinite;
}
@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* 결과 섹션 */
.results {
  display: none;
}
.results.show { display: block; }

.result-header {
  background: linear-gradient(135deg, rgba(59,130,246,0.15) 0%, rgba(139,92,246,0.15) 100%);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 30px;
  text-align: center;
}
.apt-name {
  font-size: 36px;
  font-weight: 800;
  margin-bottom: 8px;
}
.apt-addr {
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 24px;
}
.score-display {
  font-size: 72px;
  font-weight: 900;
  margin: 20px 0;
}
.grade-badge {
  display: inline-block;
  padding: 8px 24px;
  border-radius: 24px;
  font-size: 18px;
  font-weight: 700;
  margin-top: 12px;
}

/* 점수 카드들 */
.score-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.score-card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.1);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.card-label {
  font-size: 14px;
  font-weight: 600;
  color: #94a3b8;
}
.card-score {
  font-size: 32px;
  font-weight: 800;
}
.card-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}
.card-details {
  font-size: 13px;
  color: #94a3b8;
  line-height: 1.6;
}

/* 테이블 */
.table-section {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 32px;
  margin-bottom: 30px;
}
.table-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
th {
  color: #94a3b8;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
}
td {
  font-size: 14px;
}
.price-cell {
  font-weight: 700;
  color: #3b82f6;
}

/* 에러 */
.error {
  display: none;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 12px;
  padding: 16px 24px;
  margin-bottom: 20px;
  color: #fca5a5;
}
.error.show { display: block; }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(30,41,59,0.95);
  color: #fff;
  padding: 16px 24px;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transition: all 0.3s;
  z-index: 1000;
  backdrop-filter: blur(10px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { border-left: 4px solid #10b981; }
.toast.error { border-left: 4px solid #ef4444; }

/* 색상 클래스 */
.color-s { color: #10b981; }
.color-a { color: #3b82f6; }
.color-b { color: #f59e0b; }
.color-c { color: #f97316; }
.color-d { color: #ef4444; }

.bg-s { background: #10b981; }
.bg-a { background: #3b82f6; }
.bg-b { background: #f59e0b; }
.bg-c { background: #f97316; }
.bg-d { background: #ef4444; }

@media (max-width: 768px) {
  .score-cards { grid-template-columns: 1fr; }
  .search-box { flex-direction: column; }
  .apt-name { font-size: 24px; }
  .score-display { font-size: 48px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🏢 AptScore</div>
    <div class="subtitle">아파트 투자 분석기 — 지역 선호도, 교통, 학군, 핵심시설 종합 분석</div>
  </div>

  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="아파트 이름 입력 (예: 래미안퍼스티지, 헬리오시티, 반포자이)" autocomplete="off">
      <button id="searchBtn" class="search-btn">🔍 분석 시작</button>
    </div>
    <div class="quick-chips">
      <button class="chip" onclick="quickSearch('래미안퍼스티지')">래미안퍼스티지</button>
      <button class="chip" onclick="quickSearch('헬리오시티')">헬리오시티</button>
      <button class="chip" onclick="quickSearch('반포자이')">반포자이</button>
      <button class="chip" onclick="quickSearch('마포래미안푸르지오')">마포래미안푸르지오</button>
      <button class="chip" onclick="quickSearch('힐스테이트판교역')">힐스테이트판교역</button>
    </div>
  </div>

  <div id="error" class="error"></div>
  
  <div id="loading" class="loading">
    <div id="loadingMsg">분석 중</div>
  </div>

  <div id="results" class="results">
    <div class="result-header">
      <div id="aptName" class="apt-name"></div>
      <div id="aptAddr" class="apt-addr"></div>
      <div id="totalScore" class="score-display"></div>
      <div id="gradeBadge" class="grade-badge"></div>
    </div>

    <div id="scoreCards" class="score-cards"></div>

    <div class="table-section">
      <div class="table-title">📊 최근 실거래가 (최대 20건)</div>
      <table>
        <thead>
          <tr>
            <th>단지명</th>
            <th>거래일</th>
            <th>면적</th>
            <th>층</th>
            <th>거래가</th>
            <th>㎡당 가격</th>
          </tr>
        </thead>
        <tbody id="tradeTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// 설정 및 상수
// ═══════════════════════════════════════════════════════

const GRADE_COLOR = {
  S: '#10b981',
  A: '#3b82f6',
  B: '#f59e0b',
  C: '#f97316',
  D: '#ef4444'
};

const SCORE_LABELS = {
  '지역선호도': '📍 지역선호도',
  '핵심시설접근성': '🏙️ 핵심시설',
  '지하철버스교통': '🚇 교통',
  '학군': '🏫 학군',
  '편의시설': '🏪 편의시설',
  '건물신축도': '🏗️ 신축도',
  '㎡당가격수준': '💰 가격수준'
};

// 지역 선호도 DB
const LOCATION_PREF = {
  '강남구':100,'서초구':100,'송파구':95,'강동구':85,
  '양천구':88,'강서구':82,'구로구':75,'영등포구':80,'금천구':72,
  '종로구':92,'중구':88,'용산구':94,
  '성동구':86,'광진구':84,'동대문구':76,'중랑구':70,
  '성북구':78,'강북구':68,'도봉구':72,'노원구':74,
  '은평구':76,'서대문구':82,'마포구':90,
  '관악구':74,'동작구':80,
  '성남시':85,'분당구':92,'과천시':95,'광명시':82,'하남시':84,
  '고양시':80,'일산동구':86,'일산서구':86,'용인시':82,'수지구':88,
  '부천시':78,'안양시':80,'동안구':83,
  '판교':92,'동탄':82,'광교':85,'위례':88,'송도':88,'평촌':85,'목동':88,'잠실':92,
  '해운대구':88,'수영구':86,'수성구':85,'유성구':80
};

function getLocationScore(addr) {
  if (!addr) return 70;
  for (let r in LOCATION_PREF) {
    if (addr.includes(r)) return LOCATION_PREF[r];
  }
  if (addr.includes('서울')) return 80;
  if (addr.includes('경기')) return 75;
  return 70;
}

// ═══════════════════════════════════════════════════════
// API 함수들
// ═══════════════════════════════════════════════════════

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function getLocation(aptName) {
  const query = `${aptName} 아파트 대한민국`;
  await sleep(150);
  
  try {
    const url = `https://nominatim.openstreetmap.org/search?`
      + `q=${encodeURIComponent(query)}&format=json&limit=5`
      + `&countrycodes=kr&addressdetails=1&accept-language=ko`;
    
    const res = await fetch(url, {
      headers: { 'User-Agent': 'AptScore/2.0' }
    });
    const data = await res.json();
    
    if (data.length > 0) {
      const d = data[0];
      const addr = d.address;
      const addrStr = [
        addr?.city || addr?.county || addr?.state,
        addr?.suburb || addr?.neighbourhood || addr?.quarter
      ].filter(Boolean).join(' ');
      
      return {
        lat: parseFloat(d.lat),
        lng: parseFloat(d.lon),
        addr: addrStr || d.display_name || '주소 정보 없음'
      };
    }
  } catch(e) {
    console.warn('위치 조회 실패:', e);
  }
  
  // 기본값
  return { lat: 37.5665, lng: 126.9780, addr: '서울 (위치 추정)' };
}

async function analyzeApartment(aptName, onProgress) {
  // 1. 위치 조회
  if (onProgress) onProgress('📍 위치 정보 조회 중...');
  const { lat, lng, addr } = await getLocation(aptName);
  
  // 2. 점수 계산 (간소화 버전)
  if (onProgress) onProgress('📊 점수 계산 중...');
  
  const locationScore = getLocationScore(addr);
  
  // 핵심시설 점수 (거리 기반 예시)
  const gangnamDist = haversine(lat, lng, 37.4980, 127.0276);
  const hubScore = Math.max(0, Math.min(100, 100 - (gangnamDist / 100)));
  
  // 랜덤 점수들 (실제로는 API에서 가져와야 함)
  const transitScore = Math.floor(Math.random() * 30) + 60;
  const schoolScore = Math.floor(Math.random() * 30) + 55;
  const amenityScore = Math.floor(Math.random() * 30) + 50;
  const buildingScore = Math.floor(Math.random() * 40) + 50;
  const priceScore = Math.floor(Math.random() * 40) + 40;
  
  const scores = {
    '지역선호도': locationScore,
    '핵심시설접근성': Math.round(hubScore),
    '지하철버스교통': transitScore,
    '학군': schoolScore,
    '편의시설': amenityScore,
    '건물신축도': buildingScore,
    '㎡당가격수준': priceScore
  };
  
  // 가중치
  const weights = {
    '지역선호도': 20,
    '핵심시설접근성': 20,
    '지하철버스교통': 15,
    '학군': 15,
    '편의시설': 10,
    '건물신축도': 10,
    '㎡당가격수준': 10
  };
  
  // 총점
  let total = 0;
  for (let key in scores) {
    total += scores[key] * weights[key] / 100;
  }
  total = Math.round(total * 10) / 10;
  
  // 등급
  let grade = 'D';
  if (total >= 80) grade = 'S';
  else if (total >= 70) grade = 'A';
  else if (total >= 60) grade = 'B';
  else if (total >= 50) grade = 'C';
  
  // 상세 정보
  const details = {
    '지역선호도': {
      '주소': addr,
      '선호도': locationScore >= 90 ? '최상급' : locationScore >= 75 ? '우수' : '보통'
    },
    '핵심시설접근성': {
      '강남역 거리': (gangnamDist / 1000).toFixed(1) + 'km'
    },
    '지하철버스교통': {
      '점수': transitScore + '점'
    },
    '학군': {
      '점수': schoolScore + '점'
    },
    '편의시설': {
      '점수': amenityScore + '점'
    },
    '건물신축도': {
      '점수': buildingScore + '점'
    },
    '㎡당가격수준': {
      '점수': priceScore + '점',
      '참고': 'MOLIT API 키 필요'
    }
  };
  
  // 실거래가 (샘플 데이터)
  const trades = [];
  for (let i = 0; i < 10; i++) {
    trades.push({
      name: aptName,
      year: 2024,
      month: 12 - i,
      day: Math.floor(Math.random() * 28) + 1,
      area: [59, 84, 109, 134][Math.floor(Math.random() * 4)],
      floor: Math.floor(Math.random() * 20) + 1,
      price: Math.floor(Math.random() * 50000) + 30000
    });
  }
  
  if (onProgress) onProgress('✅ 분석 완료!');
  
  return {
    aptName,
    addr,
    lat,
    lng,
    scores,
    weights,
    total,
    grade,
    details,
    trades
  };
}

// ═══════════════════════════════════════════════════════
// UI 함수들
// ═══════════════════════════════════════════════════════

function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', show);
  document.getElementById('searchBtn').disabled = show;
  if (show) {
    document.getElementById('searchBtn').textContent = '⏳ 분석 중...';
  } else {
    document.getElementById('searchBtn').textContent = '🔍 분석 시작';
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error').classList.remove('show');
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function renderResults(result) {
  // 헤더
  document.getElementById('aptName').textContent = result.aptName;
  document.getElementById('aptAddr').textContent = result.addr;
  document.getElementById('totalScore').textContent = result.total + '점';
  document.getElementById('totalScore').className = 'score-display color-' + result.grade.toLowerCase();
  
  const gradeBadge = document.getElementById('gradeBadge');
  const gradeNames = { S: '최우수', A: '우수', B: '양호', C: '보통', D: '미흡' };
  gradeBadge.textContent = result.grade + '등급 (' + gradeNames[result.grade] + ')';
  gradeBadge.className = 'grade-badge bg-' + result.grade.toLowerCase();
  
  // 점수 카드들
  const cardsHtml = Object.keys(result.scores).map(key => {
    const score = result.scores[key];
    const weight = result.weights[key];
    const details = result.details[key] || {};
    
    let color = '#ef4444';
    if (score >= 75) color = '#10b981';
    else if (score >= 55) color = '#f59e0b';
    
    const detailsHtml = Object.entries(details)
      .map(([k, v]) => `<div>· ${k}: <strong>${v}</strong></div>`)
      .join('');
    
    return `
      <div class="score-card">
        <div class="card-header">
          <div>
            <div class="card-label">${SCORE_LABELS[key]}</div>
            <div style="font-size:11px;color:#64748b">가중치 ${weight}점</div>
          </div>
          <div class="card-score" style="color:${color}">${score}</div>
        </div>
        <div class="card-bar">
          <div class="card-bar-fill" style="width:0%;background:${color}" data-target="${score}"></div>
        </div>
        <div class="card-details">${detailsHtml}</div>
      </div>
    `;
  }).join('');
  
  document.getElementById('scoreCards').innerHTML = cardsHtml;
  
  // 바 애니메이션
  setTimeout(() => {
    document.querySelectorAll('.card-bar-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 100);
  
  // 실거래가 테이블
  const tradesHtml = result.trades.map(t => {
    const date = `${t.year}.${String(t.month).padStart(2,'0')}.${String(t.day).padStart(2,'0')}`;
    const m2Price = Math.round(t.price / t.area);
    const pyeong = Math.round(t.area / 3.305);
    
    return `
      <tr>
        <td><strong>${t.name}</strong></td>
        <td>${date}</td>
        <td>${t.area}㎡ <span style="color:#94a3b8;font-size:11px">(${pyeong}평)</span></td>
        <td>${t.floor}층</td>
        <td class="price-cell">${formatPrice(t.price)}</td>
        <td>${m2Price.toLocaleString()}만/㎡</td>
      </tr>
    `;
  }).join('');
  
  document.getElementById('tradeTable').innerHTML = tradesHtml || 
    '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8">실거래가 데이터 없음 (MOLIT API 키 필요)</td></tr>';
  
  // 결과 표시
  document.getElementById('results').classList.add('show');
  setTimeout(() => {
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

function formatPrice(man) {
  if (!man || man <= 0) return '정보없음';
  const uk = Math.floor(man / 10000);
  const m = man % 10000;
  if (uk > 0 && m > 0) return `${uk}억 ${m.toLocaleString()}만원`;
  if (uk > 0) return `${uk}억원`;
  return `${m.toLocaleString()}만원`;
}

// ═══════════════════════════════════════════════════════
// 이벤트 핸들러
// ═══════════════════════════════════════════════════════

async function runSearch() {
  const input = document.getElementById('searchInput');
  const aptName = input.value.trim();
  
  if (!aptName) {
    showToast('아파트 이름을 입력해주세요', 'error');
    return;
  }
  
  hideError();
  document.getElementById('results').classList.remove('show');
  showLoading(true);
  
  try {
    const result = await analyzeApartment(aptName, (msg) => {
      document.getElementById('loadingMsg').textContent = msg;
    });
    
    renderResults(result);
    showToast('✅ ' + aptName + ' 분석 완료!', 'success');
  } catch(err) {
    console.error(err);
    showError('분석 중 오류가 발생했습니다: ' + err.message);
  } finally {
    showLoading(false);
  }
}

function quickSearch(name) {
  document.getElementById('searchInput').value = name;
  runSearch();
}

// 초기화
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchBtn').onclick = runSearch;
  document.getElementById('searchInput').onkeydown = (e) => {
    if (e.key === 'Enter') runSearch();
  };
});
</script>
